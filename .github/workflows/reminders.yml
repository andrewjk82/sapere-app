name: Scheduled Reminders

on:
  schedule:
    - cron: '0,30 * * * *' # Every 30 minutes
  workflow_dispatch: # Allow manual trigger

jobs:
  hit-cron-endpoint:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Sapere Cron
        run: |
          curl -X GET "https://sapere-app.vercel.app/api/cron-unified"
