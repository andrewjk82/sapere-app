name: Scheduled Reminders

on:
  schedule:
    - cron: '0,30 * * * *' # Every 30 minutes (UTC)
  workflow_dispatch: # ← Enables "Run workflow" button in GitHub UI

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Sapere Cron Endpoint
        run: |
          echo "⏰ Triggering cron at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          RESPONSE=$(curl -s -w "\n%{http_code}" -X GET "https://sapere-app.vercel.app/api/cron-unified")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "📋 Response: $BODY"
          echo "📊 HTTP Status: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Cron endpoint failed with status $HTTP_CODE"
            exit 1
          fi
          echo "✅ Cron executed successfully"
