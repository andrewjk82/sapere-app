<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Test MathView HTML</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
</head>
<body>
  <div id="test"></div>

  <script>
    const htmlString = `Choose the diagram that correctly shows $\\frac{8}{7}$ if the whole is <div style="display: inline-grid; grid-template-columns: repeat(7, 14px); grid-template-rows: repeat(1, 14px); gap: 1px; background: #94a3b8; border: 1px solid #94a3b8; padding: 1px; vertical-align: middle;"><div style="background: #ffffff; width: 14px; height: 14px;"></div><div style="background: #ffffff; width: 14px; height: 14px;"></div></div>.`;
    
    document.getElementById('test').innerHTML = htmlString;
    
    renderMathInElement(document.getElementById('test'), {
        delimiters: [
          { left: '$$', right: '$$', display: true },
          { left: '$',  right: '$',  display: false },
        ],
        throwOnError: false,
    });
  </script>
</body>
</html>
