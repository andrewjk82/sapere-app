<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 240" width="560" height="240" role="img" aria-label="Two bulldozers and a bee on a number line">
  <rect width="560" height="240" fill="#ffffff"/>
  <!-- title -->
  <text x="280" y="28" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#64748b">Construction site (side view)</text>

  <!-- ground -->
  <line x1="40" y1="150" x2="520" y2="150" stroke="#1e293b" stroke-width="2.5"/>
  <!-- tick marks at A and B -->
  <line x1="80" y1="145" x2="80" y2="155" stroke="#1e293b" stroke-width="2"/>
  <line x1="480" y1="145" x2="480" y2="155" stroke="#1e293b" stroke-width="2"/>

  <!-- x labels under ground -->
  <text x="80" y="210" text-anchor="middle" font-family="Georgia,serif" font-size="13" fill="#0f172a">x = 0</text>
  <text x="480" y="210" text-anchor="middle" font-family="Georgia,serif" font-size="13" fill="#0f172a">x = 48</text>

  <!-- dimension 48 m -->
  <line x1="80" y1="188" x2="480" y2="188" stroke="#334155" stroke-width="1.3"/>
  <line x1="80" y1="182" x2="80" y2="194" stroke="#334155" stroke-width="1.3"/>
  <line x1="480" y1="182" x2="480" y2="194" stroke="#334155" stroke-width="1.3"/>
  <text x="280" y="182" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#0f172a">48 m</text>

  <!-- ===== Bulldozer A (left, facing right) ===== -->
  <!-- body -->
  <rect x="48" y="100" width="52" height="36" rx="3" fill="#e2e8f0" stroke="#0f172a" stroke-width="2"/>
  <!-- cabin -->
  <rect x="54" y="82" width="28" height="20" rx="2" fill="#cbd5e1" stroke="#0f172a" stroke-width="1.5"/>
  <!-- scoop / blade pointing right toward B -->
  <path d="M100 108 L118 100 L118 136 L100 128 Z" fill="#94a3b8" stroke="#0f172a" stroke-width="1.5"/>
  <!-- tracks -->
  <ellipse cx="62" cy="142" rx="12" ry="7" fill="#64748b" stroke="#0f172a" stroke-width="1.2"/>
  <ellipse cx="88" cy="142" rx="12" ry="7" fill="#64748b" stroke="#0f172a" stroke-width="1.2"/>
  <!-- label A -->
  <text x="74" y="74" text-anchor="middle" font-family="Georgia,serif" font-size="16" font-weight="700" fill="#0f172a">A</text>
  <!-- velocity arrow for A (rightward) -->
  <defs>
    <marker id="arrowR" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrowL" markerWidth="8" markerHeight="8" refX="0" refY="3" orient="auto">
      <path d="M6,0 L0,3 L6,6 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrowBee" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#ca8a04"/>
    </marker>
  </defs>
  <line x1="120" y1="118" x2="165" y2="118" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowR)"/>
  <text x="142" y="110" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#2563eb" font-weight="600">V</text>

  <!-- ===== Bulldozer B (right, facing left) ===== -->
  <rect x="460" y="100" width="52" height="36" rx="3" fill="#e2e8f0" stroke="#0f172a" stroke-width="2"/>
  <rect x="478" y="82" width="28" height="20" rx="2" fill="#cbd5e1" stroke="#0f172a" stroke-width="1.5"/>
  <!-- scoop pointing left toward A -->
  <path d="M460 108 L442 100 L442 136 L460 128 Z" fill="#94a3b8" stroke="#0f172a" stroke-width="1.5"/>
  <ellipse cx="472" cy="142" rx="12" ry="7" fill="#64748b" stroke="#0f172a" stroke-width="1.2"/>
  <ellipse cx="498" cy="142" rx="12" ry="7" fill="#64748b" stroke="#0f172a" stroke-width="1.2"/>
  <text x="486" y="74" text-anchor="middle" font-family="Georgia,serif" font-size="16" font-weight="700" fill="#0f172a">B</text>
  <!-- velocity arrow for B (leftward) -->
  <line x1="438" y1="118" x2="393" y2="118" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowL)"/>
  <text x="416" y="110" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#2563eb" font-weight="600">V</text>

  <!-- ===== Bee on scoop of A ===== -->
  <!-- body -->
  <ellipse cx="118" cy="88" rx="10" ry="7" fill="#facc15" stroke="#0f172a" stroke-width="1.2"/>
  <circle cx="126" cy="86" r="4.5" fill="#fde047" stroke="#0f172a" stroke-width="1"/>
  <!-- wings -->
  <ellipse cx="114" cy="78" rx="6" ry="3.5" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1" opacity="0.9"/>
  <ellipse cx="122" cy="76" rx="5" ry="3" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1" opacity="0.9"/>
  <!-- stripes -->
  <line x1="112" y1="88" x2="112" y2="92" stroke="#0f172a" stroke-width="1.2"/>
  <line x1="117" y1="87" x2="117" y2="93" stroke="#0f172a" stroke-width="1.2"/>
  <text x="118" y="64" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#a16207">bee</text>
  <!-- bee flight arrow toward B -->
  <path d="M140 80 Q220 50 300 70" fill="none" stroke="#ca8a04" stroke-width="1.8" stroke-dasharray="4 3" marker-end="url(#arrowBee)"/>
  <text x="220" y="48" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#a16207" font-weight="600">3V (back and forth)</text>

  <!-- legend note -->
  <text x="280" y="230" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">Both bulldozers move toward each other at speed V; the bee flies at speed 3V</text>
</svg>